name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Create beta prerelease"
        required: false
        default: false
        type: boolean

jobs:
  release:
    name: Version and Release
    runs-on: macos-26
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync root deps (semantic-release)
        run: uv sync

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            uv run semantic-release version --as-prerelease --prerelease-token beta
          else
            uv run semantic-release version
          fi

      - name: Upload artifacts to release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          gh release upload "v$VERSION" dist/Setmac.dmg cli/dist/setmac-cli --clobber
